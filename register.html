<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - LifeHub</title>
    <link rel="stylesheet" href="css/login.css">
    <script src="js/register.js"></script>
</head>

<body>
    <div class="login-bg">
        <div class="login-card">
            <a href="index.html" class="close-btn" title="关闭">✕</a>

            <div class="brand">
                <div class="brand-logo">
                    <div class="spinner">
                        <div class="spinner1"></div>
                    </div>
                </div>
                <span class="brand-name">LifeHub</span>
            </div>

            <h2>注册</h2>

            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="请输入用户名">
                    <span class="hint" id="usernameHint"></span>

                    <input type="password" id="password" placeholder="请输入密码">
                    <span class="hint" id="passwordHint"></span>

                    <input type="password" id="confirmPassword" placeholder="请再次输入密码">
                    <span class="hint" id="confirmHint"></span>
                </div>
                <button type="submit" class="login-btn">注 册</button>
            </form>

            <div class="extra">
                <a href="login.html">已有账号？去登录</a>
            </div>

            <div class="back-home">
                <a href="index.html">← 返回首页</a>
            </div>
        </div>

        <p class="copyright">© 2026 LifeHub</p>
    </div>
</body>

</html>
