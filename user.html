        (function () {
            // 获取 URL 中的 id 参数
            const params = new URLSearchParams(window.location.search);
            const targetUser = params.get('id');

            // 如果 URL 中有 id 参数，存到 localStorage 中，供 user.js 使用
            if (targetUser) {
                localStorage.setItem('viewingUser', targetUser);
            } else {
                // 如果没有 id 参数，清除 viewingUser，表示查看自己的主页
                localStorage.removeItem('viewingUser');
            }
        })();
    </script>
